<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
<style>
  .wave {
    animation: wave 8s linear infinite;
  }
  #wave2 {
    animation-duration: 12s;
    animation-direction: reverse;
    animation-delay: -2s;
  }
  #wave3 {
    animation-duration: 6s;
    animation-delay: -4s;
  }
  @keyframes wave {
    0% { transform: translateX(0); }
    100% { transform: translateX(-600px); }
  }
</style>

<defs>
  <!-- Double wide path for smoother looping -->
  <path id="wave-path" d="M 0,100 C 150,30 300,170 450,100 C 600,30 750,170 900,100 C 1050,30 1200,170 1350,100 C 1500,30 1650,170 1800,100 L 1800,200 L 0,200 Z" />
</defs>

<use id="wave1" class="wave" xlink:href="#wave-path" fill="#6C63FF" opacity="0.8"/>
<use id="wave2" class="wave" xlink:href="#wave-path" fill="#4ECDC4" opacity="0.5" transform="translate(0,-15)"/>
<use id="wave3" class="wave" xlink:href="#wave-path" fill="#FFE66D" opacity="0.3" transform="translate(0,-30)"/>
</svg>
