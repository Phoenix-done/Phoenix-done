<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" preserveAspectRatio="none">
  <style>
    .wave {
      animation: wave 6s ease-in-out infinite alternate;
    }
    #wave2 {
      animation-duration: 8s;
      animation-delay: -2s;
      opacity: 0.6;
    }
    #wave3 {
      animation-duration: 4s;
      animation-delay: -4s;
      opacity: 0.3;
    }
    @keyframes wave {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(-50px) translateY(-10px); }
    }
  </style>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C63FF" />
      <stop offset="50%" stop-color="#4ECDC4" />
      <stop offset="100%" stop-color="#FFE66D" />
    </linearGradient>
  </defs>
  
  <path id="wave-path" d="M0,50 C100,20 200,80 300,50 C400,20 500,80 600,50 C700,20 800,80 900,50 C1000,20 1100,80 1200,50 L1200,150 L0,150 Z" />
  
  <use class="wave" href="#wave-path" fill="url(#grad)" />
  <use id="wave2" class="wave" href="#wave-path" fill="url(#grad)" transform="translate(0,-10)" />
  <use id="wave3" class="wave" href="#wave-path" fill="url(#grad)" transform="translate(0,-20)" />
</svg>
